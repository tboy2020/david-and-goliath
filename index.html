<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2A1A4A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>David &amp; the Giant — Kingdom Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2A1A4A; --bg2:#3D2766; --purple:#5B3A9E; --purple-lt:#7C5BC0;
    --gold:#F4C542; --gold-lt:#FFD86B; --gold-deep:#C9962A;
    --cream:#FFF7E6; --green:#4CC38A; --red:#E0644B; --ink:#1B1030;
    --shadow:0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:'Nunito',-apple-system,system-ui,sans-serif;
    background:radial-gradient(circle at 50% 0%, #3D2766 0%, #2A1A4A 60%, #1B1030 100%);
    color:var(--cream); overflow:hidden; position:fixed; inset:0;
    -webkit-user-select:none; user-select:none; touch-action:manipulation;}
  #app{position:absolute; inset:0;}
  .screen{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:env(safe-area-inset-top) 18px env(safe-area-inset-bottom); text-align:center; animation:fadein .4s ease; overflow-y:auto;}
  @keyframes fadein{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  h1,h2,h3{font-family:'Baloo 2',cursive; line-height:1.05; font-weight:800;}
  h1{font-size:clamp(34px,9vw,58px); color:var(--gold-lt); text-shadow:0 3px 0 var(--gold-deep), 0 6px 18px rgba(0,0,0,.4);}
  h2{font-size:clamp(24px,6.5vw,38px); color:var(--gold-lt); text-shadow:0 2px 0 var(--gold-deep);}
  .verse{font-style:italic; color:#E7D9FF; font-size:clamp(15px,4.2vw,19px); max-width:600px; line-height:1.45; margin:10px auto;}
  .ref{font-family:'Baloo 2'; color:var(--gold); font-weight:700; font-size:14px; letter-spacing:.5px; text-transform:uppercase;}
  .narr{font-size:clamp(17px,4.8vw,22px); font-weight:700; max-width:620px; line-height:1.35; margin:14px auto;}
  .btn{font-family:'Baloo 2'; font-weight:800; font-size:clamp(18px,5.4vw,24px); color:var(--ink);
    background:linear-gradient(180deg,var(--gold-lt),var(--gold)); border:none; border-radius:22px;
    padding:16px 30px; margin:8px; box-shadow:0 6px 0 var(--gold-deep), var(--shadow); cursor:pointer;
    transition:transform .08s, box-shadow .08s; min-width:180px; min-height:60px;}
  .btn:active{transform:translateY(4px); box-shadow:0 2px 0 var(--gold-deep), var(--shadow);}
  .btn.ghost{background:linear-gradient(180deg,var(--purple-lt),var(--purple)); color:var(--cream); box-shadow:0 6px 0 #3a2470, var(--shadow);}
  .btn.ghost:active{box-shadow:0 2px 0 #3a2470;}
  .btn.small{font-size:16px; padding:11px 20px; min-width:auto; min-height:48px; border-radius:16px;}
  .btn:disabled{opacity:.5;}
  .row{display:flex; flex-wrap:wrap; justify-content:center; align-items:center;}
  .topbar{position:absolute; top:env(safe-area-inset-top); left:0; right:0; height:54px; display:flex; align-items:center; justify-content:space-between; padding:8px 14px; z-index:30;}
  .pill{background:rgba(0,0,0,.3); border:2px solid var(--gold); border-radius:30px; padding:6px 14px; font-family:'Baloo 2'; font-weight:700; color:var(--gold-lt); font-size:14px;}
  .iconbtn{width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,.3); border:2px solid var(--gold); color:var(--gold-lt); font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-left:8px;}
  .iconrow{display:flex;}
  svg{display:block; overflow:visible;}
  .stage-svg{width:min(92vw,520px); height:auto; margin:6px auto;}
  .tap{cursor:pointer; transition:transform .15s;}
  .tap:active{transform:scale(.92);}
  .meter-wrap{width:min(88vw,420px); margin:14px auto;}
  .meter-label{display:flex; justify-content:space-between; font-family:'Baloo 2'; font-weight:700; color:var(--gold-lt); font-size:15px; margin-bottom:6px;}
  .meter{height:22px; background:rgba(0,0,0,.35); border-radius:30px; border:2px solid var(--gold-deep); overflow:hidden;}
  .meter-fill{height:100%; width:0%; background:linear-gradient(90deg,var(--gold),var(--gold-lt)); border-radius:30px; transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .chore-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; width:min(92vw,460px); margin:8px auto;}
  .chore-card{background:linear-gradient(180deg,var(--purple),var(--bg2)); border:3px solid var(--gold-deep); border-radius:20px; padding:14px 10px; cursor:pointer; position:relative; transition:transform .1s; box-shadow:var(--shadow);}
  .chore-card:active{transform:scale(.96);}
  .chore-card.done{border-color:var(--green);}
  .chore-card.locked{opacity:.5; filter:grayscale(.4);}
  .chore-card .emoji{font-size:42px;}
  .chore-card .nm{font-family:'Baloo 2'; font-weight:700; font-size:16px; margin-top:4px; color:var(--gold-lt);}
  .chore-card .badge{position:absolute; top:6px; right:8px; font-size:22px;}
  .chore-card.full{grid-column:1 / -1;}
  .prof{display:flex; flex-direction:column; align-items:center; gap:6px; background:linear-gradient(180deg,var(--purple),var(--bg2)); border:3px solid var(--gold); border-radius:24px; padding:18px 22px; cursor:pointer; min-width:120px; transition:transform .1s;}
  .prof:active{transform:scale(.95);}
  .prof .ava{font-size:54px;} .prof .pn{font-family:'Baloo 2'; font-weight:800; font-size:20px; color:var(--gold-lt);}
  .field{font-size:20px; padding:14px; border-radius:16px; border:3px solid var(--gold); background:var(--cream); color:var(--ink); font-family:'Baloo 2'; font-weight:700; text-align:center; width:min(82vw,340px);}
  textarea.field{text-align:left; font-family:'Nunito'; font-weight:600; font-size:16px; min-height:200px; width:min(90vw,520px); line-height:1.5;}
  .speak-box{background:rgba(0,0,0,.35); border:3px solid var(--gold); border-radius:20px; padding:18px; width:min(94vw,620px); margin:10px auto;}
  .speak-line{font-family:'Baloo 2'; font-weight:800; font-size:clamp(20px,5.6vw,30px); color:var(--gold-lt); line-height:1.25;}
  .mic{width:88px; height:88px; border-radius:50%; background:linear-gradient(180deg,var(--red),#b8472f); border:4px solid var(--cream); font-size:38px; color:#fff; display:flex; align-items:center; justify-content:center; margin:12px auto; cursor:pointer; box-shadow:var(--shadow);}
  .mic.listening{animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1); box-shadow:0 0 0 0 rgba(224,100,75,.6);} 50%{transform:scale(1.06); box-shadow:0 0 0 18px rgba(224,100,75,0);}}
  .hint{color:#C9B8E8; font-size:14px; margin-top:6px;}
  .sparkle{position:absolute; pointer-events:none; font-size:28px; animation:spark .8s ease forwards; z-index:60;}
  @keyframes spark{0%{opacity:1; transform:translateY(0) scale(.5);} 100%{opacity:0; transform:translateY(-60px) scale(1.4);}}
  .badge-card{background:linear-gradient(180deg,var(--gold-lt),var(--gold)); color:var(--ink); border-radius:24px; padding:20px; width:min(92vw,460px); box-shadow:var(--shadow); border:4px solid var(--cream);}
  .badge-card .ref{color:var(--gold-deep);}
  .toast{position:absolute; bottom:90px; left:50%; transform:translateX(-50%); background:var(--green); color:#06301e; font-family:'Baloo 2'; font-weight:800; padding:12px 22px; border-radius:30px; font-size:18px; box-shadow:var(--shadow); animation:fadein .3s; z-index:50;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.01ms !important;}}
  .grow-in{animation:grow .9s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes grow{from{transform:scale(.2); opacity:0;} to{transform:scale(1); opacity:1;}}
  .shake{animation:shake .5s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-7px);}80%{transform:translateX(7px);}}
  .progdot{display:inline-block; width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.25); margin:2px;}
  .progdot.on{background:var(--gold);}
  .arena{position:relative; width:min(92vw,460px); height:290px; margin:8px auto; border-radius:24px; border:3px solid var(--gold-deep); overflow:hidden;}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
(function(){
  var app = document.getElementById('app');

  /* ============ AUDIO ============ */
  var audioCtx=null, ttsUnlocked=false, soundOn=true;
  function unlockAudio(){
    try{
      if(!audioCtx){ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
      if(audioCtx.state==='suspended'){ audioCtx.resume(); }
      if(window.speechSynthesis){ var u=new SpeechSynthesisUtterance(' '); u.volume=0; window.speechSynthesis.speak(u); }
      ttsUnlocked=true;
    }catch(e){}
  }
  function tone(f,d,t,v){ if(!soundOn||!audioCtx) return;
    try{ var o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=t||'sine'; o.frequency.value=f;
      g.gain.value=(v==null?0.12:v); o.connect(g); g.connect(audioCtx.destination);
      var n=audioCtx.currentTime; g.gain.setValueAtTime(g.gain.value,n);
      g.gain.exponentialRampToValueAtTime(0.0001,n+(d||0.18)); o.start(n); o.stop(n+(d||0.18)); }catch(e){} }
  function sfx(name){
    if(name==='plink'){ tone(880,0.12,'triangle',0.15); }
    else if(name==='good'){ tone(660,0.1,'sine',0.14); setTimeout(function(){tone(990,0.16,'sine',0.14);},90); }
    else if(name==='whoosh'){ tone(300,0.25,'sawtooth',0.08); }
    else if(name==='thud'){ tone(120,0.35,'square',0.18); }
    else if(name==='cheer'){ [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){tone(f,0.22,'sine',0.13);}, i*120); }); }
    else if(name==='tap'){ tone(520,0.06,'triangle',0.1); }
    else if(name==='amen'){ [392,523,659].forEach(function(f,i){ setTimeout(function(){tone(f,0.4,'sine',0.12);}, i*150); }); }
  }
  function safeSpeak(text, cb, opts){
    opts=opts||{};
    if(!window.speechSynthesis || !ttsUnlocked){ if(cb) setTimeout(cb,500); return; }
    try{ window.speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(text);
      u.rate=opts.rate||0.9; u.pitch=opts.pitch==null?1.05:opts.pitch; u.volume=1;
      u.onend=function(){ if(cb) cb(); }; u.onerror=function(){ if(cb) cb(); };
      window.speechSynthesis.speak(u);
    }catch(e){ if(cb) cb(); }
  }
  function stopSpeak(){ try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){} }

  /* ============ SPEECH RECOGNITION ============ */
  var STOP={the:1,and:1,for:1,you:1,your:1,this:1,that:1,with:1,into:1,are:1,our:1,his:1,her:1,him:1,she:1,but:1,not:1,was:1,from:1,thy:1,unto:1,hath:1};
  function deriveKeys(text){
    var w=text.toLowerCase().replace(/[^a-z ]/g,' ').split(/\s+/).filter(function(x){return x.length>=4 && !STOP[x];});
    return w.slice(0,3);
  }
  function recognize(keys, lenient, onMatch, onFail){
    var Rec=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!Rec){ onFail&&onFail('nomic'); return null; }
    try{
      var r=new Rec(); r.lang='en-US'; r.interimResults=false; r.maxAlternatives=4;
      r.onresult=function(ev){
        var ok=false;
        for(var i=0;i<ev.results.length;i++){ for(var j=0;j<ev.results[i].length;j++){
          var said=(ev.results[i][j].transcript||'').toLowerCase().replace(/[^a-z ]/g,' ');
          if(!keys.length){ ok=true; break; }
          var hits=keys.filter(function(k){ return said.indexOf(k)>-1; }).length;
          if(lenient ? hits>=1 : hits>=keys.length){ ok=true; }
        } if(ok) break; }
        if(ok) onMatch(); else onFail&&onFail('miss');
      };
      r.onerror=function(){ onFail&&onFail('err'); };
      r.start(); return r;
    }catch(e){ onFail&&onFail('err'); return null; }
  }
  function hasMic(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }

  /* ============ SAVE / SETTINGS ============ */
  var PROF_KEY='dg_profiles_v2', PIN_KEY='dg_pin_v2', PRAY_KEY='dg_prayers_v2';
  function saveKey(n){ return 'dg_save_v2_'+n; }
  function getProfiles(){ try{ return JSON.parse(localStorage.getItem(PROF_KEY)||'[]'); }catch(e){ return []; } }
  function addProfile(n){ var p=getProfiles(); if(p.indexOf(n)===-1){ p.push(n); localStorage.setItem(PROF_KEY,JSON.stringify(p)); } }
  function freshSave(n){ return {name:n, chores:{pray:false,sheep:false,food:false,sweep:false,sling:false}, badges:[], wins:0}; }
  function loadSave(n){ try{ var s=JSON.parse(localStorage.getItem(saveKey(n))); return (s&&s.chores)?s:freshSave(n); }catch(e){ return freshSave(n); } }
  function persist(){ if(ST.save){ try{ localStorage.setItem(saveKey(ST.save.name),JSON.stringify(ST.save)); }catch(e){} } }

  var DEFAULT_PRAYERS=[
    "Father, I thank you for the gift of life.",
    "Father, you are faithful, gracious and merciful.",
    "Father, I thank you for giving your angels to watch over me.",
    "Father, I thank you for my parents, brothers and sisters, families and friends, neighbours and neighbourhood.",
    "Father, I commit this day into your hands, in Jesus' name. Amen.",
    "Father, I cover myself, my family and loved ones with the blood of Jesus."
  ];
  function getPrayers(){ try{ var p=JSON.parse(localStorage.getItem(PRAY_KEY)); return (p&&p.length)?p:DEFAULT_PRAYERS.slice(); }catch(e){ return DEFAULT_PRAYERS.slice(); } }
  function setPrayers(arr){ localStorage.setItem(PRAY_KEY,JSON.stringify(arr)); }

  var LORDS=[
    {t:"Our Father which art in heaven,",keys:["father","heaven"]},
    {t:"Hallowed be thy name.",keys:["hallowed","name"]},
    {t:"Thy kingdom come,",keys:["kingdom","come"]},
    {t:"Thy will be done in earth, as it is in heaven.",keys:["will","done","heaven"]},
    {t:"Give us this day our daily bread.",keys:["daily","bread"]},
    {t:"And forgive us our debts, as we forgive our debtors.",keys:["forgive","debts"]},
    {t:"And lead us not into temptation, but deliver us from evil:",keys:["lead","temptation","deliver"]},
    {t:"For thine is the kingdom, and the power, and the glory, for ever.",keys:["kingdom","power","glory"]},
    {t:"Amen.",keys:["amen"]}
  ];

  var ST={save:null};
  function choresDone(){ var c=ST.save.chores,n=0; for(var k in c){ if(c[k]) n++; } return n; }
  function allDone(){ return choresDone()>=5; }

  var CHORE_VERSE={
    pray:{verse:"But seek ye first the kingdom of God, and his righteousness; and all these things shall be added unto you.",ref:"Matthew 6:33"},
    sheep:{verse:"The LORD is my shepherd; I shall not want.",ref:"Psalm 23:1"},
    food:{verse:"Honour thy father and thy mother: that thy days may be long upon the land which the LORD thy God giveth thee.",ref:"Exodus 20:12"},
    sweep:{verse:"Whatsoever thy hand findeth to do, do it with thy might; for there is no work, nor device, nor knowledge, nor wisdom, in the grave, whither thou goest.",ref:"Ecclesiastes 9:10"},
    sling:{verse:"A man's gift maketh room for him, and bringeth him before great men.",ref:"Proverbs 18:16"}
  };
  var CHORE_META={
    pray:{emoji:'🙏',name:'Morning Prayer'},
    sheep:{emoji:'🐑',name:'Mind the Sheep'},
    food:{emoji:'🧺',name:'Food for Mum & Dad'},
    sweep:{emoji:'🧹',name:'Sweep the House'},
    sling:{emoji:'🎯',name:'Practise the Sling'}
  };

  /* ============ ART ============ */
  function davidSVG(s,opts){ s=s||1; opts=opts||{};
    var crown=opts.crown?'<path d="M-26 -86 l8 -16 8 12 8 -16 8 12 8 -16 v18 z" fill="#FFD86B" stroke="#C9962A" stroke-width="2"/>':'';
    return '<g transform="scale('+s+')">'+crown+
      '<circle cx="0" cy="-64" r="20" fill="#E8B894"/>'+
      '<path d="M-20 -70 q-2 -22 20 -22 q22 0 20 22 q-8 -8 -20 -8 q-12 0 -20 8z" fill="#5A3A22"/>'+
      '<circle cx="-7" cy="-66" r="2.6" fill="#1B1030"/><circle cx="8" cy="-66" r="2.6" fill="#1B1030"/>'+
      '<path d="M-6 -56 q6 5 12 0" stroke="#7a4a2a" stroke-width="2.4" fill="none" stroke-linecap="round"/>'+
      '<path d="M-22 -44 q22 -10 44 0 l-6 50 q-16 8 -32 0 z" fill="#F4C542" stroke="#C9962A" stroke-width="3"/>'+
      '<path d="M-22 -44 q22 -10 44 0 l-3 14 q-19 -8 -38 0z" fill="#FFD86B"/>'+
      '<rect x="-19" y="-2" width="38" height="8" rx="3" fill="#8A5A2A"/>'+
      '<path d="M-20 -40 q-18 8 -22 30" stroke="#E8B894" stroke-width="9" fill="none" stroke-linecap="round"/>'+
      '<path d="M20 -40 q16 6 18 22" stroke="#E8B894" stroke-width="9" fill="none" stroke-linecap="round"/>'+
      '<path d="M-10 6 l-3 30" stroke="#7C5BC0" stroke-width="11" stroke-linecap="round"/>'+
      '<path d="M10 6 l3 30" stroke="#7C5BC0" stroke-width="11" stroke-linecap="round"/></g>';
  }
  function goliathSVG(s){ s=s||1;
    return '<g transform="scale('+s+')">'+
      '<path d="M-16 30 l-6 46" stroke="#4a4036" stroke-width="20" stroke-linecap="round"/>'+
      '<path d="M16 30 l6 46" stroke="#4a4036" stroke-width="20" stroke-linecap="round"/>'+
      '<path d="M-34 -34 q34 -16 68 0 l-8 72 q-26 12 -52 0z" fill="#6B5B4A" stroke="#2E2A22" stroke-width="4"/>'+
      '<path d="M-30 -20 h60 M-30 -2 h60 M-30 16 h60" stroke="#2E2A22" stroke-width="3" opacity=".5"/>'+
      '<path d="M-32 -28 q-26 14 -28 44" stroke="#8a7a64" stroke-width="16" fill="none" stroke-linecap="round"/>'+
      '<path d="M32 -28 q28 10 30 40" stroke="#8a7a64" stroke-width="16" fill="none" stroke-linecap="round"/>'+
      '<line x1="60" y1="-60" x2="50" y2="80" stroke="#5a3a22" stroke-width="5"/>'+
      '<path d="M60 -60 l-8 -18 l16 4z" fill="#b9b2a6"/>'+
      '<circle cx="0" cy="-54" r="24" fill="#9a8468"/>'+
      '<path d="M-26 -58 q0 -30 26 -30 q26 0 26 30 q-10 -10 -26 -10 q-16 0 -26 10z" fill="#4a4036"/>'+
      '<rect x="-3" y="-78" width="6" height="16" fill="#E0644B"/>'+
      '<circle cx="-9" cy="-54" r="3" fill="#1B1030"/><circle cx="9" cy="-54" r="3" fill="#1B1030"/>'+
      '<path d="M-10 -42 q10 6 20 0" stroke="#3a2a1a" stroke-width="3" fill="none" stroke-linecap="round"/></g>';
  }
  function sheepSVG(){ return '<g>'+
    '<ellipse cx="0" cy="0" rx="20" ry="15" fill="#FFF7E6"/>'+
    '<circle cx="-12" cy="-6" r="9" fill="#FFF7E6"/><circle cx="12" cy="-6" r="9" fill="#FFF7E6"/><circle cx="0" cy="-10" r="10" fill="#FFF7E6"/>'+
    '<ellipse cx="16" cy="2" rx="8" ry="7" fill="#3a2a2a"/><circle cx="19" cy="0" r="1.6" fill="#fff"/>'+
    '<line x1="-8" y1="14" x2="-8" y2="22" stroke="#3a2a2a" stroke-width="3"/><line x1="8" y1="14" x2="8" y2="22" stroke="#3a2a2a" stroke-width="3"/></g>'; }

  /* ============ HELPERS ============ */
  function render(html){ stopSpeak(); app.innerHTML=html; }
  function $(s,r){ return (r||document).querySelector(s); }
  function $all(s,r){ return Array.prototype.slice.call((r||document).querySelectorAll(s)); }
  function on(e,ev,fn){ if(e) e.addEventListener(ev,fn,{passive:false}); }
  function sparkleAt(x,y){ var s=document.createElement('div'); s.className='sparkle'; s.textContent='✨'; s.style.left=x+'px'; s.style.top=y+'px'; document.body.appendChild(s); setTimeout(function(){s.remove();},800); }
  function toast(m){ var t=document.createElement('div'); t.className='toast'; t.textContent=m; app.appendChild(t); setTimeout(function(){t.remove();},1600); }
  function topbar(showParent){
    return '<div class="topbar"><div class="pill">⭐ '+(ST.save?ST.save.name:'')+'</div>'+
      '<div class="iconrow">'+
      (showParent?'<div class="iconbtn" id="parentBtn">⚙️</div>':'')+
      '<div class="iconbtn" id="muteBtn">'+(soundOn?'🔊':'🔇')+'</div></div></div>';
  }
  function wireTop(){
    on($('#muteBtn'),'click',function(){ soundOn=!soundOn; if(!soundOn) stopSpeak(); this.textContent=soundOn?'🔊':'🔇'; });
    on($('#parentBtn'),'click',function(){ parentGate(); });
  }

  /* ============ TITLE / PROFILES ============ */
  function gateScreen(){
    render('<div class="screen"><div style="font-size:80px" class="grow-in">⚔️</div>'+
      '<h1>David &amp; the Giant</h1><p class="ref">A Kingdom Hero Adventure</p>'+
      '<p class="narr" style="max-width:440px">Be faithful in the little things \u2014 then face the giant in the name of the LORD!</p>'+
      '<button class="btn" id="startBtn">Tap to Begin ▶</button>'+
      '<p class="hint">Turn your sound on \u2014 David will talk to you!</p></div>');
    on($('#startBtn'),'click',function(){ unlockAudio(); setTimeout(profilesScreen,120); });
  }
  function profilesScreen(){

  function prayerFlow(){
    var lines=[];
    getPrayers().forEach(function(t){ lines.push({t:t,keys:deriveKeys(t),lenient:true}); });
    LORDS.forEach(function(l){ lines.push({t:l.t,keys:l.keys,lenient:false,lords:true}); });

    function renderLine(){

      render(topbar(false)+'<div class="screen" style="justify-content:flex-start; padding-top:60px">'+

        '<p class="hint">Line '+(i+1)+' of '+lines.length+'</p>'+
        '<div class="speak-box"><p class="speak-line">\u201C'+ln.t+'\u201D</p></div>'+
        (hasMic()?'<div class="mic" id="mic">🎤</div><p class="hint" id="mh">Tap the mic and say it out loud</p>'
                 :'<p class="hint">Say it out loud together!</p>')+

        '<button class="btn" id="said">I said it ✓</button></div>'+
        '<button class="btn ghost small" id="exitP" style="margin-top:4px">Exit</button></div>');
      wireTop();
      safeSpeak(ln.t, null, {rate:0.86});
      function advance(){ sfx('good'); var m=$('#mic'); if(m) m.classList.remove('listening');
        i++; if(i>=lines.length){ donePrayer(); } else { setTimeout(renderLine,500); } }
      on($('#said'),'click',advance);
      on($('#repeat'),'click',function(){ safeSpeak(ln.t,null,{rate:0.82}); });
      on($('#exitP'),'click',homeScreen);
      if(hasMic()){
        var mic=$('#mic');
        on(mic,'click',function(){
          mic.classList.add('listening'); var mh=$('#mh'); if(mh) mh.textContent='Listening... say it now!'; stopSpeak();
          recognize(ln.keys, ln.lenient, function(){ advance(); }, function(){
            mic.classList.remove('listening'); var h=$('#mh'); if(h) h.textContent='Try again, or tap \u201CI said it ✓\u201D';
          });
        });
      }
    }
    function donePrayer(){
      sfx('amen');

        '<button class="btn" id="toHome">Go to chores ▶</button></div>');
      safeSpeak('Amen! Well done. You sought God first. Now your chores are open.');
      on($('#toHome'),'click',homeScreen);
    }
    renderLine();
  }

  /* ============ CHORE: SWEEP (3 rooms + tidy) ============ */
  function choreSweep(){
    var room=1;
    function sweepRoom(n,count,next){
      var pos=[]; for(var i=0;i<count;i++){ pos.push([10+Math.random()*78,18+Math.random()*60]); }
      var piles=pos.map(function(p,i){ return '<div class="dust" style="position:absolute; left:'+p[0]+'%; top:'+p[1]+'%; font-size:32px">💨</div>'; }).join('');
      render(topbar(false)+'<div class="screen" style="justify-content:flex-start; padding-top:60px">'+
        choreHeader('sweep','Room '+n+' of 3')+
        '<p class="narr" id="swn">Drag your finger over the dust to sweep it away! ('+count+' spots)</p>'+
        '<div class="arena" id="floorbox" style="background:linear-gradient(180deg,#b58d5a,#8a6638); touch-action:none">'+
          '<div style="position:absolute; left:50%; top:8px; transform:translateX(-50%); font-size:42px">🧹</div>'+piles+'</div>'+
        '<button class="btn ghost small" id="backC">Back</button></div>');
      wireTop(); on($('#backC'),'click',homeScreen);
      var cleared=0, box=$('#floorbox'), down=false;
      safeSpeak('Room '+n+'. Sweep all the dust away. Drag your finger over each spot!');
      function clearAt(cx,cy){ $all('.dust',box).forEach(function(d){ if(d.dataset.gone) return; var r=d.getBoundingClientRect();
        if(cx>r.left-26 && cx<r.right+26 && cy>r.top-26 && cy<r.bottom+26){ d.dataset.gone='1'; d.style.transition='opacity .3s'; d.style.opacity='0'; cleared++; sfx('tap'); sparkleAt(r.left+14,r.top);
          $('#swn').textContent=cleared+' / '+count+' clean'; if(cleared>=count){ setTimeout(next,500); } } }); }
      on(box,'pointerdown',function(e){ down=true; clearAt(e.clientX,e.clientY); });
      on(box,'pointermove',function(e){ if(down){ e.preventDefault(); clearAt(e.clientX,e.clientY); } });
      on(box,'pointerup',function(){ down=false; });
      on(box,'pointerleave',function(){ down=false; });
    }
    function tidy(){
      var toys=[['🧸',16,22],['⚽',64,18],['📕',38,44],['🪀',74,50],['🧩',24,56]], items='';

      render(topbar(false)+'<div class="screen" style="justify-content:flex-start; padding-top:60px">'+
        choreHeader('sweep','Last step \u2014 tidy up')+
        '<p class="narr" id="tn">Tap each toy to put it away in the box!</p>'+
        '<div class="arena" style="background:linear-gradient(180deg,#b58d5a,#8a6638)"><div style="position:absolute; right:10px; bottom:8px; font-size:48px">📦</div>'+items+'</div>'+
        '<button class="btn ghost small" id="backC">Back</button></div>');
      wireTop(); on($('#backC'),'click',homeScreen);
      var n=5; safeSpeak('Now tidy up. Tap each toy to put it away!');
      $all('.toy').forEach(function(t){ on(t,'click',function(){ if(t.dataset.done) return; t.dataset.done='1'; sfx('plink');
        var r=t.getBoundingClientRect(); sparkleAt(r.left+16,r.top); t.style.transition='all .5s'; t.style.left='86%'; t.style.top='78%'; t.style.opacity='0';
        n--; if(n<=0){ setTimeout(function(){ completeChore('sweep'); },600); } }); });
    }
    sweepRoom(1,5,function(){ sweepRoom(2,6,function(){ sweepRoom(3,7,tidy); }); });
  }

  /* ============ CHORE: SLING practice (rounds + moving) ============ */
  function choreSling(){
    var round=1, total=3;
    function play(moving){
      render(topbar(false)+'<div class="screen" style="justify-content:flex-start; padding-top:60px">'+
        choreHeader('sling','Round '+round+' of '+total)+
        '<p class="narr" id="sln">Hold to spin the sling, let go to throw at the target!</p>'+
        '<div class="arena" id="arena" style="background:linear-gradient(180deg,#8Fb6e0,#6FA84B 70%)">'+
          '<div style="position:absolute; left:30px; bottom:18px"><svg width="80" height="120" viewBox="-60 -110 120 150">'+davidSVG(0.85)+'</svg></div>'+
          '<div id="target" style="position:absolute; right:30px; bottom:60px; font-size:54px">🎯</div>'+
          '<div id="stone" style="position:absolute; left:60px; bottom:80px; font-size:22px; opacity:0">⚪</div>'+
          '<div id="spinRing" style="position:absolute; left:44px; bottom:40px; width:46px; height:46px; border-radius:50%; border:5px solid rgba(255,255,255,.4); border-top-color:var(--gold); opacity:0"></div>'+
        '</div>'+
        '<button class="btn" id="throwBtn">Hold to Spin 🪢</button>'+
        '<button class="btn ghost small" id="backC">Back</button></div>');
      wireTop(); on($('#backC'),'click',homeScreen);
      safeSpeak(round===1?'Hold the button to spin your sling. Let go to throw and hit the target!':'Round '+round+'! Aim and throw!');
      var tgt=$('#target');
      var mv=null;
      if(moving){ var dir=1,x=0; mv=setInterval(function(){ x+=dir*1.4; if(x>30||x<-30) dir*=-1; tgt.style.transform='translateY('+x+'px)'; },40); }
      runThrow(function(){ if(mv) clearInterval(mv); round++; if(round>total){ setTimeout(function(){ completeChore('sling'); },800); } else { setTimeout(function(){ play(round===total); },900); } });
    }
    function runThrow(onHit){
      var btn=$('#throwBtn'), ring=$('#spinRing'), stone=$('#stone'), target=$('#target'), arena=$('#arena');
      var spinning=false, power=0, raf=null, rot=0;
      function loop(){ if(!spinning) return; power=Math.min(power+0.04,1); rot+=8+power*22; ring.style.transform='rotate('+rot+'deg)'; ring.style.opacity='1'; raf=requestAnimationFrame(loop); }
      function start(e){ if(e)e.preventDefault(); if(spinning) return; spinning=true; power=0; sfx('whoosh'); btn.textContent='Let go to THROW!'; loop(); }
      function rel(e){ if(e)e.preventDefault(); if(!spinning) return; spinning=false; cancelAnimationFrame(raf); ring.style.opacity='0'; btn.disabled=true; btn.textContent='...'; fly(); }
      function fly(){ sfx('whoosh'); var aR=arena.getBoundingClientRect(), tR=target.getBoundingClientRect();
        var sx=60, sy=aR.height-80, ex=(tR.left-aR.left)+tR.width/2-10, ey=aR.height-((aR.bottom-tR.top)+tR.height/2);
        stone.style.opacity='1'; var t=0;
        (function step(){ t+=0.045; if(t>=1){ stone.style.opacity='0'; hit(); return; }
          var x=sx+(ex-sx)*t, arc=-120*Math.sin(Math.PI*t), y=sy+(ey-sy)*t+arc;
          stone.style.left=x+'px'; stone.style.bottom=(aR.height-y)+'px'; requestAnimationFrame(step); })();
      }
      function hit(){ sfx('thud'); target.style.transform='scale(1.3) rotate(15deg)'; var tR=target.getBoundingClientRect(); sparkleAt(tR.left+20,tR.top);
        arena.classList.add('shake'); setTimeout(function(){ arena.classList.remove('shake'); },500); var s=$('#sln'); if(s) s.textContent='Bullseye! 🎯'; sfx('cheer'); onHit(); }
      on(btn,'pointerdown',start); on(btn,'pointerup',rel); on(btn,'pointerleave',function(e){ if(spinning) rel(e); });
      on(btn,'touchstart',start); on(btn,'touchend',rel);
    }
    play(false);
  }

  /* ============ BATTLE ============ */
  function battleReveal(){
    render(topbar(false)+'<div class="screen"><p class="ref">Act 2 — The Valley of Elah</p>'+
      '<p class="narr" id="bn">Jesse sent David with food to his brothers at the camp. There David saw a giant...</p>'+
      '<div id="scene" class="arena" style="border:none; background:none; height:280px">'+
        '<div id="gol" style="position:absolute; right:20px; bottom:0; opacity:0"><svg width="150" height="240" viewBox="-70 -90 140 180">'+goliathSVG(1.3)+'</svg></div>'+
        '<div style="position:absolute; left:18px; bottom:0"><svg width="70" height="120" viewBox="-60 -110 120 150">'+davidSVG(0.8)+'</svg></div></div>'+
      '<button class="btn" id="next">▶</button></div>');
    wireTop();
    safeSpeak('Jesse sent David with food to his brothers. There, David saw a giant named Goliath.', function(){
      var g=$('#gol'); if(g){ g.style.transition='all 1s cubic-bezier(.2,.9,.3,1.3)'; g.classList.add('grow-in'); g.style.opacity='1'; } sfx('thud');
      setTimeout(function(){ var b=$('#bn'); if(b) b.textContent='Goliath roared, "Who will fight me?" But David knew the living God!'; safeSpeak('Goliath was over nine feet tall! But David was not afraid, for he knew the living God.'); },1000);
    });
    on($('#next'),'click',battleSaul);
  }
  function battleSaul(){
    speakCheckpoint({ ref:'1 Samuel 17:37', speaker:'👑',
      setup:'King Saul said, "You are only a boy!" David answered with faith. Say it with him:',
      line:'The LORD will deliver me', keys:['lord','deliver'],
      verse:'The LORD that delivered me out of the paw of the lion, and out of the paw of the bear, he will deliver me out of the hand of this Philistine.',
      next: battleArmor });
  }
  function battleArmor(){
    render(topbar(false)+'<div class="screen"><p class="ref">1 Samuel 17:39</p>'+
      '<p class="narr" id="an">Saul put his heavy armour on David. It was too big! Tap each piece to take it off.</p>'+
      '<div style="position:relative; margin:6px auto; width:200px; height:240px">'+
        '<svg width="200" height="240" viewBox="-60 -110 120 160" style="position:absolute; left:0; top:0">'+davidSVG(1.1)+'</svg>'+
        '<div class="tap armorp" style="position:absolute; left:78px; top:6px; font-size:38px">⛑️</div>'+
        '<div class="tap armorp" style="position:absolute; left:74px; top:96px; font-size:44px">🦺</div>'+
        '<div class="tap armorp" style="position:absolute; left:140px; top:120px; font-size:40px">⚔️</div></div>'+
      '<button class="btn small" id="skip" style="display:none">Continue ▶</button></div>');
    wireTop();
    safeSpeak('Saul put his heavy armour on David, but it was too big. Tap each piece to take it off. David will win God\u2019s way!');
    var n=3;
    $all('.armorp').forEach(function(p){ on(p,'click',function(){ if(p.dataset.gone) return; p.dataset.gone='1';
      p.style.transition='all .5s'; p.style.transform='translateY(120px) rotate(40deg)'; p.style.opacity='0'; sfx('plink');
      var r=p.getBoundingClientRect(); sparkleAt(r.left+16,r.top); n--;
      if(n<=0){ $('#an').textContent='Now David is free to win God\u2019s way!'; safeSpeak('Now David is free! He will win God\u2019s way.'); var s=$('#skip'); s.style.display='inline-block'; on(s,'click',battleStones); } }); });
  }
  function battleStones(){
    var stones=[{s:1,x:14,y:24},{s:0,x:40,y:16},{s:1,x:66,y:28},{s:1,x:24,y:54},{s:0,x:78,y:50},{s:1,x:50,y:62},{s:1,x:70,y:70}], items='';
    stones.forEach(function(o){ items+='<div class="tap stoney" data-smooth="'+o.s+'" style="position:absolute; left:'+o.x+'%; top:'+o.y+'%; font-size:'+(o.s?'30px':'36px')+'">'+(o.s?'⚪':'🪨')+'</div>'; });
    render(topbar(false)+'<div class="screen"><p class="ref">1 Samuel 17:40</p>'+
      '<p class="narr" id="stn">Pick 5 SMOOTH stones (round ⚪) from the brook. Count them!</p>'+
      '<div class="arena" style="background:linear-gradient(180deg,#7fc0e8,#3f86b8)">'+items+
        '<div style="position:absolute; left:8px; bottom:8px; font-size:28px">👝 <span id="cnt">0</span>/5</div></div></div>');
    wireTop();
    safeSpeak('David chose five smooth stones. Tap five smooth round stones, and count them!');
    var got=0;
    $all('.stoney').forEach(function(s){ on(s,'click',function(){ if(s.dataset.done) return;
      if(s.getAttribute('data-smooth')==='0'){ sfx('thud'); s.classList.add('shake'); safeSpeak('That one is too rough. Find a smooth round one!'); setTimeout(function(){s.classList.remove('shake');},500); return; }
      s.dataset.done='1'; got++; sfx('plink'); var r=s.getBoundingClientRect(); sparkleAt(r.left+14,r.top);
      s.style.transition='all .5s'; s.style.left='6%'; s.style.top='84%'; s.style.opacity='0'; $('#cnt').textContent=got; safeSpeak(String(got));
      if(got>=5){ $('#stn').textContent='Five smooth stones \u2014 ready!'; setTimeout(battleShowdown,800); } }); });
  }
  function battleShowdown(){
    render(topbar(false)+'<div class="screen"><p class="ref">1 Samuel 17:45</p>'+
      '<p class="narr" id="shn">Goliath laughed at the boy. But David ran toward him, shouting his faith!</p>'+
      '<div class="arena" style="border:none; background:none; height:220px">'+
        '<div style="position:absolute; left:14px; bottom:0"><svg width="64" height="110" viewBox="-60 -110 120 150">'+davidSVG(0.7)+'</svg></div>'+
        '<div style="position:absolute; right:14px; bottom:0"><svg width="130" height="200" viewBox="-70 -90 140 180">'+goliathSVG(1.15)+'</svg></div></div>'+
      '<button class="btn" id="go">Shout with David ▶</button></div>');
    wireTop();
    safeSpeak('Goliath laughed at the boy. But David ran toward him, shouting his faith out loud!');
    on($('#go'),'click',function(){
      speakCheckpoint({ ref:'1 Samuel 17:45', speaker:'⚔️', setup:'Shout it bravely:',
        line:'I come to thee in the name of the LORD', keys:['name','lord'],
        verse:'Thou comest to me with a sword, and with a spear, and with a shield: but I come to thee in the name of the LORD of hosts, the God of the armies of Israel, whom thou hast defied.',
        next:function(){
          speakCheckpoint({ ref:'1 Samuel 17:47', speaker:'⚔️', setup:'And one more, the greatest truth:',
            line:'The battle is the LORD\u2019S', keys:['battle','lord'],
            verse:'And all this assembly shall know that the LORD saveth not with sword and spear: for the battle is the LORD\u2019S, and he will give you into our hands.',
            next: battleSling });
        } });
    });
  }
  function battleSling(){
    render(topbar(false)+'<div class="screen"><p class="ref">1 Samuel 17:49</p>'+
      '<p class="narr" id="sln2">Hold to spin your sling... let go to throw the stone in God\u2019s name!</p>'+
      '<div class="arena" id="arena" style="background:linear-gradient(180deg,#8Fb6e0,#6FA84B 70%)">'+
        '<div style="position:absolute; left:30px; bottom:18px"><svg width="80" height="120" viewBox="-60 -110 120 150">'+davidSVG(0.85)+'</svg></div>'+
        '<div id="target" style="position:absolute; right:24px; bottom:30px"><svg id="golsvg" width="130" height="200" viewBox="-70 -90 140 180">'+goliathSVG(1.15)+'</svg></div>'+
        '<div id="stone" style="position:absolute; left:60px; bottom:80px; font-size:22px; opacity:0">⚪</div>'+
        '<div id="spinRing" style="position:absolute; left:44px; bottom:40px; width:46px; height:46px; border-radius:50%; border:5px solid rgba(255,255,255,.4); border-top-color:var(--gold); opacity:0"></div></div>'+
      '<button class="btn" id="throwBtn">Hold to Spin 🪢</button></div>');
    wireTop();
    safeSpeak('Hold the button to spin your sling. Let go to throw the stone, in the name of the Lord!');
    var btn=$('#throwBtn'), ring=$('#spinRing'), stone=$('#stone'), target=$('#target'), arena=$('#arena'), gol=$('#golsvg');
    var spinning=false, power=0, raf=null, rot=0, thrown=false;
    function loop(){ if(!spinning) return; power=Math.min(power+0.04,1); rot+=8+power*22; ring.style.transform='rotate('+rot+'deg)'; ring.style.opacity='1'; raf=requestAnimationFrame(loop); }
    function start(e){ if(e)e.preventDefault(); if(spinning||thrown) return; spinning=true; power=0; sfx('whoosh'); btn.textContent='Let go to THROW!'; loop(); }
    function rel(e){ if(e)e.preventDefault(); if(!spinning) return; spinning=false; cancelAnimationFrame(raf); ring.style.opacity='0'; btn.disabled=true; btn.textContent='...'; fly(); }
    function fly(){ thrown=true; sfx('whoosh'); var aR=arena.getBoundingClientRect(), tR=target.getBoundingClientRect();
      var sx=60, sy=aR.height-80, ex=(tR.left-aR.left)+tR.width/2-10, ey=aR.height-((aR.bottom-tR.top)+tR.height*0.2);
      stone.style.opacity='1'; var t=0;
      (function step(){ t+=0.04; if(t>=1){ stone.style.opacity='0'; topple(); return; }
        var x=sx+(ex-sx)*t, arc=-130*Math.sin(Math.PI*t), y=sy+(ey-sy)*t+arc;
        stone.style.left=x+'px'; stone.style.bottom=(aR.height-y)+'px'; requestAnimationFrame(step); })(); }
    function topple(){ sfx('thud'); arena.classList.add('shake'); gol.style.transition='transform 1s cubic-bezier(.3,.7,.4,1)'; gol.style.transformOrigin='bottom right'; gol.style.transform='rotate(85deg) translateY(20px)';
      var tR=target.getBoundingClientRect(); sparkleAt(tR.left+30,tR.top+30); sparkleAt(tR.left+60,tR.top+10);
      var s=$('#sln2'); if(s) s.textContent='The giant is down! The battle was the LORD\u2019S!';
      safeSpeak('The stone struck, and the giant fell! The battle was the Lord\u2019s. You did it, '+ST.save.name+'!'); sfx('cheer'); setTimeout(battleVictory,2200); }
    on(btn,'pointerdown',start); on(btn,'pointerup',rel); on(btn,'pointerleave',function(e){ if(spinning) rel(e); });
    on(btn,'touchstart',start); on(btn,'touchend',rel);
  }
  function battleVictory(){
    ST.save.wins=(ST.save.wins||0)+1; if(ST.save.badges.indexOf('giant-slayer')===-1) ST.save.badges.push('giant-slayer'); persist();
    render('<div class="screen"><div style="font-size:74px" class="grow-in">👑</div><h1>Victory!</h1>'+
      '<p class="narr">'+ST.save.name+' the Kingdom Hero!</p>'+
      '<div class="badge-card"><div style="font-size:40px">🛡️⭐</div>'+
        '<p class="verse" style="color:#3a2470">\u201CAnd all this assembly shall know that the LORD saveth not with sword and spear: for the battle is the LORD\u2019S.\u201D</p>'+
        '<p class="ref">1 Samuel 17:47 \u2014 your memory verse</p></div>'+
      '<div class="row"><button class="btn" id="again">Play Again ▶</button><button class="btn ghost" id="home2">Home 🏠</button></div></div>');
    sfx('cheer'); safeSpeak('Victory! '+ST.save.name+', you are a Kingdom Hero! Remember: the battle is the Lord\u2019s. Well done!');
    on($('#again'),'click',battleReveal); on($('#home2'),'click',homeScreen);
  }

  function speakCheckpoint(cfg){
    var hr=hasMic();
    render(topbar(false)+'<div class="screen"><p class="ref">'+cfg.ref+'</p>'+
      '<div style="font-size:50px">'+(cfg.speaker||'⚔️')+'</div><p class="narr">'+cfg.setup+'</p>'+
      '<div class="speak-box"><p class="speak-line">\u201C'+cfg.line+'\u201D</p></div>'+
      (hr?'<div class="mic" id="mic">🎤</div><p class="hint" id="mh">Tap the mic and say it out loud</p>':'<p class="hint">Say it out loud together!</p>')+
      '<button class="btn" id="said">I said it ✓</button></div>');
    wireTop();
    safeSpeak(cfg.setup+' '+cfg.line);
    var done=false;
    function advance(){ if(done) return; done=true; sfx('good'); stopSpeak(); var m=$('#mic'); if(m) m.classList.remove('listening');
      if(cfg.verse){ safeSpeak('Amen! '+cfg.verse, function(){}); } else { safeSpeak('Amen! Well said!'); }
      setTimeout(cfg.next, cfg.verse?1400:700); }
    on($('#said'),'click',advance);
    if(hr){ var mic=$('#mic'); on(mic,'click',function(){ mic.classList.add('listening'); var mh=$('#mh'); if(mh) mh.textContent='Listening... say it now!'; stopSpeak();
      recognize(cfg.keys,false,function(){ advance(); },function(){ mic.classList.remove('listening'); var h=$('#mh'); if(h) h.textContent='Try again, or tap \u201CI said it ✓\u201D'; }); }); }
  }

  /* ============ PARENT SECTION ============ */
  function parentGate(){
    stopSpeak();
    var pin=localStorage.getItem(PIN_KEY);
    if(!pin){
      render('<div class="screen"><h2>Parent Setup</h2><p class="narr" style="max-width:420px">Create a 4-digit PIN for the Parent area.</p>'+
        '<input class="field" id="pinIn" inputmode="numeric" maxlength="4" placeholder="4-digit PIN">'+
        '<div class="row"><button class="btn" id="setPin">Save PIN</button><button class="btn ghost small" id="cancel">Cancel</button></div></div>');
      on($('#setPin'),'click',function(){ var v=($('#pinIn').value||'').trim(); if(v.length<4){ toast('Use 4 digits'); return; } localStorage.setItem(PIN_KEY,v); parentPanel(); });
      on($('#cancel'),'click',function(){ ST.save?homeScreen():profilesScreen(); });
      setTimeout(function(){ $('#pinIn').focus(); },200); return;
    }
    render('<div class="screen"><h2>👨\u200d👩\u200d👧 Parent Area</h2><p class="narr">Enter your PIN</p>'+
      '<input class="field" id="pinIn" inputmode="numeric" maxlength="4" placeholder="PIN" autocomplete="off">'+
      '<div class="row"><button class="btn" id="enter">Enter</button><button class="btn ghost small" id="cancel">Cancel</button></div>'+
      '<p class="hint" id="pe"></p></div>');
    on($('#enter'),'click',function(){ if(($('#pinIn').value||'').trim()===pin){ parentPanel(); } else { $('#pe').textContent='Wrong PIN'; sfx('thud'); } });
    on($('#cancel'),'click',function(){ ST.save?homeScreen():profilesScreen(); });
    setTimeout(function(){ $('#pinIn').focus(); },200);
  }
  function parentPanel(){
    var prayers=getPrayers().join('\n');
    render('<div class="screen" style="justify-content:flex-start; padding-top:50px"><h2>Parent Area</h2>'+
      '<p class="ref">Morning Prayer lines</p>'+
      '<p class="hint" style="max-width:520px">Type one prayer line per row. These are spoken first each morning; the Lord\u2019s Prayer is always added after them. Edit anytime \u2014 the children pray your latest words next time.</p>'+
      '<textarea class="field" id="prayBox" spellcheck="false">'+prayers.replace(/</g,'&lt;')+'</textarea>'+
      '<div class="row"><button class="btn" id="savePr">Save prayers</button>'+
      '<button class="btn ghost small" id="resetPr">Restore defaults</button></div>'+
      '<hr style="border:none; border-top:1px solid rgba(255,255,255,.15); width:80%; margin:14px 0">'+
      '<p class="ref">Daily reset'+(ST.save?' \u2014 '+ST.save.name:'')+'</p>'+
      (ST.save?'<div class="row"><button class="btn ghost small" id="newDay">New day (pray again)</button>'+
      '<button class="btn ghost small" id="resetAll">Reset all progress</button></div>':'<p class="hint">Pick a player first to reset their progress.</p>')+
      '<hr style="border:none; border-top:1px solid rgba(255,255,255,.15); width:80%; margin:14px 0">'+
      '<div class="row"><button class="btn ghost small" id="chPin">Change PIN</button>'+
      '<button class="btn" id="done">Done</button></div></div>');
    on($('#savePr'),'click',function(){ var lines=($('#prayBox').value||'').split('\n').map(function(s){return s.trim();}).filter(function(s){return s.length;}); if(!lines.length){ toast('Add at least one line'); return; } setPrayers(lines); toast('Prayers saved ✓'); });
    on($('#resetPr'),'click',function(){ setPrayers(DEFAULT_PRAYERS.slice()); $('#prayBox').value=DEFAULT_PRAYERS.join('\n'); toast('Defaults restored'); });
    on($('#done'),'click',function(){ ST.save?homeScreen():profilesScreen(); });
    on($('#chPin'),'click',function(){ localStorage.removeItem(PIN_KEY); parentGate(); });
    if(ST.save){
      on($('#newDay'),'click',function(){ ST.save.chores.pray=false; persist(); toast('New day \u2014 they\u2019ll pray first'); });
      on($('#resetAll'),'click',function(){ ST.save=freshSave(ST.save.name); persist(); toast('Progress reset for '+ST.save.name); });
    }
  }

  gateScreen();
})();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
